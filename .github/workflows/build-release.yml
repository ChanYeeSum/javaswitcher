name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies (forge)
        working-directory: javaswitcher
        run: npm install

      - name: Build Squirrel installer (forge)
        working-directory: javaswitcher
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Portable + NSIS (electron-builder)
        working-directory: javaswitcher
        run: npx electron-builder --win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Squirrel installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: JDK-Switcher-Squirrel
          path: javaswitcher/out/make/squirrel.windows/**/*

      - name: Upload builder artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JDK-Switcher-Builder
          path: javaswitcher/out/builder/**/*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            javaswitcher/out/make/squirrel.windows/**/*.exe
            javaswitcher/out/make/squirrel.windows/**/*.nupkg
            javaswitcher/out/builder/*.exe
            javaswitcher/out/builder/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
