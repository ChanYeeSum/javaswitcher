name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: javaswitcher
        run: npm install

      - name: Build Electron app
        working-directory: javaswitcher
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: JDK-Switcher-Windows-ZIP
          path: javaswitcher/out/make/zip/**/*.zip

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            javaswitcher/out/make/squirrel.windows/**/*.exe
            javaswitcher/out/make/squirrel.windows/**/*.nupkg
            javaswitcher/out/make/zip/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}